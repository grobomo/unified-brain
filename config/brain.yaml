interval: 3
db_path: data/brain.db
registry_path: config/projects.json

brain:
  llm_backend: subprocess
  claude_path: claude
  timeout: 60
  # For API backend (containers/EC2):
  # llm_backend: api
  # api_key: ${ANTHROPIC_API_KEY}
  # model: claude-sonnet-4-20250514

dispatcher:
  outbox_dir: data/outbox
  results_dir: data/inbox

memory:
  tier2_max_age_hours: 168
  tier3_max_age_hours: 720

compact_every_n_cycles: 10

context:
  context_hours: 48
  max_related_events: 10
  max_author_events: 5

adapters:
  github:
    enabled: true
    repos:
      - grobomo/unified-brain
      - grobomo/github-agent
      - grobomo/ccc-manager
      - grobomo/claude-portable
      - grobomo/hackathon26
      - grobomo/hook-runner
      - grobomo/mcp-manager
      - grobomo/blueprint-extra-mcp
  teams:
    enabled: false
    # Secrets in brain.local.yaml:
    # tenant_id, client_id, client_secret, chat_ids

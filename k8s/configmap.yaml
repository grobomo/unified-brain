apiVersion: v1
kind: ConfigMap
metadata:
  name: unified-brain-config
data:
  brain.yaml: |
    interval: 300
    db_path: data/brain.db
    registry_path: config/projects.json

    brain:
      llm_backend: api
      api_key: ${ANTHROPIC_API_KEY}
      model: claude-sonnet-4-20250514
      max_tokens: 1024
      timeout: 60

    dispatcher:
      transport: file
      outbox_dir: data/outbox
      results_dir: data/inbox

    memory:
      tier2_max_age_hours: 168
      tier3_max_age_hours: 720

    compact_every_n_cycles: 10

    context:
      context_hours: 48
      max_related_events: 10
      max_author_events: 5

    adapters:
      github:
        enabled: true
        repos:
          - grobomo/unified-brain
          - grobomo/github-agent
          - grobomo/ccc-manager
          - grobomo/claude-portable
          - grobomo/hackathon26
          - grobomo/hook-runner
          - grobomo/mcp-manager
          - grobomo/blueprint-extra-mcp
      teams:
        enabled: ${TEAMS_ENABLED}
        auth_mode: client_credentials
        tenant_id: ${TEAMS_TENANT_ID}
        client_id: ${TEAMS_CLIENT_ID}
        client_secret: ${TEAMS_CLIENT_SECRET}
        chat_ids: ${TEAMS_CHAT_IDS}

  projects.json: |
    {
      "projects": {
        "unified-brain": {
          "repos": ["grobomo/unified-brain"],
          "teams_chats": [],
          "people": [],
          "worker_type": "local"
        },
        "ccc-manager": {
          "repos": ["grobomo/ccc-manager"],
          "teams_chats": [],
          "people": [],
          "worker_type": "k8s"
        },
        "claude-portable": {
          "repos": ["grobomo/claude-portable"],
          "teams_chats": [],
          "people": [],
          "worker_type": "ec2"
        },
        "hackathon": {
          "repos": ["grobomo/hackathon26"],
          "teams_chats": [],
          "people": [],
          "worker_type": "k8s"
        },
        "mcp-infra": {
          "repos": ["grobomo/mcp-manager", "grobomo/blueprint-extra-mcp", "grobomo/hook-runner"],
          "teams_chats": [],
          "people": [],
          "worker_type": "local"
        }
      }
    }
